name: Gerar Executável DJ
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Instalar Essentia e PyInstaller
        run: |
          python -m pip install --upgrade pip
          # Usando uma versão que o servidor confirmou que possui (dev234)
          pip install essentia==2.1b6.dev234 pyinstaller

      - name: Criar EXE
        run: |
          pyinstaller --onefile --name "DJ_AutoRename_Macedo" dj_analyzer.py

      - name: Upload do EXE
        uses: actions/upload-artifact@v4
        with:
          name: Programa_Renomeador_DJ
          path: dist/DJ_AutoRename_Macedo.exe
