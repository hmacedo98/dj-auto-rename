name: Gerar Executável DJ
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Criar EXE
        run: |
          pyinstaller --onefile --name "DJ_AutoRename_Macedo" dj_analyzer.py
      - name: Upload do EXE
        uses: actions/upload-artifact@v4
        with:
          name: Programa_Renomeador_DJ
          path: dist/DJ_AutoRename_Macedo.exe
