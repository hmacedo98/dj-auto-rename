name: Build DJ Analyzer EXE

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          architecture: "x64"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Instalar dependências
        run: |
          pip install pyinstaller
          pip install essentia

      - name: Verificar instalação do Essentia
        run: |
          python -c "import essentia; print('Essentia instalado com sucesso')"

      - name: Descobrir caminho do Essentia
        run: |
          python -c "import essentia, os; print(os.path.dirname(essentia.__file__))" > essentia_path.txt
          $path = Get-Content essentia_path.txt
          echo "ESSENTIA_PATH=$path" >> $env:GITHUB_ENV

      - name: Build EXE
        run: |
          pyinstaller dj_analyzer.py `
            --name DJ_AutoRename_Macedo `
            --onefile `
            --clean `
            --hidden-import=essentia `
            --hidden-import=essentia.standard `
            --add-data "$env:ESSENTIA_PATH;essentia"

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: DJ_AutoRename_Macedo
          path: dist/DJ_AutoRename_Macedo.exe
